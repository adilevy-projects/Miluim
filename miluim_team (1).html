<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צוות מבצעים — לוח מילואים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --k-dark:#3a3d2e;--k-mid:#5a6040;--k-base:#7a7f55;--k-light:#a8ad7e;
  --k-pale:#d6d9b8;--k-bg:#f2f0e6;--k-card:#fafaf4;--k-border:#c8cba8;
  --k-amber:#c8860a;--k-amber-bg:#fdf3d8;--k-text:#2c2e1e;--k-muted:#6b6e50;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Rubik',sans-serif;background:var(--k-bg);color:var(--k-text);direction:rtl;}

/* HEADER */
.kheader{background:var(--k-dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.kheader-left{display:flex;align-items:center;gap:12px;}
.klogo{width:38px;height:38px;background:var(--k-base);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.kheader h1{font-size:17px;font-weight:700;color:#e8ebd0;letter-spacing:.2px;}
.kheader p{font-size:11px;color:var(--k-light);margin-top:2px;}
.kbtn-row{display:flex;gap:8px;}
.kbtn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;border:none;font-family:'Rubik',sans-serif;transition:all .15s;letter-spacing:.1px;}
.kbtn-team{background:var(--k-base);color:#f0f2e0;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.kbtn-team:hover{background:var(--k-mid);transform:translateY(-1px);}
.kbtn-ai{background:var(--k-amber);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.kbtn-ai:hover{background:#a06d08;transform:translateY(-1px);}

/* STATS */
.kstats{display:flex;gap:10px;padding:12px 24px;background:var(--k-dark);border-top:1px solid #4a4d38;}
.kstat{background:#4a4d38;border-radius:8px;padding:8px 14px;flex:1;text-align:center;}
.kstat-num{font-size:22px;font-weight:700;color:#d6d9b8;}
.kstat-lbl{font-size:11px;color:var(--k-light);margin-top:2px;font-weight:500;}

/* TABLE */
.ktable-wrap{overflow-x:auto;margin:16px;border-radius:10px;border:1px solid var(--k-border);background:var(--k-card);box-shadow:0 2px 8px rgba(58,61,46,.08);}
table.main-t{border-collapse:collapse;width:100%;font-size:12px;}
table.main-t th{background:var(--k-dark);color:var(--k-pale);font-weight:600;padding:7px 3px;text-align:center;border-bottom:1px solid #4a4d38;border-right:1px solid #4a4d38;white-space:nowrap;font-family:'Rubik',sans-serif;}
table.main-t th.nc{min-width:130px;text-align:right;padding-right:14px;font-size:11px;position:sticky;right:0;z-index:3;background:var(--k-dark);}
table.main-t td{padding:5px 3px;text-align:center;border-bottom:.5px solid var(--k-border);border-right:.5px solid var(--k-border);transition:background .1s;}
table.main-t td.ncell{text-align:right;padding:7px 14px;background:var(--k-card);position:sticky;right:0;z-index:1;border-right:2px solid var(--k-border);min-width:130px;}
table.main-t tr:hover td{background:rgba(168,173,126,.08);}
table.main-t tr:hover td.ncell{background:#f2f5e8;}
.nm{font-size:13px;font-weight:600;color:var(--k-dark);}
.nr{font-size:10px;color:var(--k-muted);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
td.dc{min-width:28px;}
td.dc.shab{background:#eeeee5;}
td.dc.con{background:var(--k-amber-bg);}
td.dc.con::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:var(--k-amber);margin:0 auto;}
td.dc.tdy{border-top:2px solid var(--k-base);border-bottom:2px solid var(--k-base);background:rgba(122,127,85,.07);}
table.main-t th.tdy{background:#4a5230!important;border-top:2px solid var(--k-light)!important;}
tr:last-child td{border-bottom:none;}th:last-child,td:last-child{border-right:none;}
.rp{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.rs{background:#e1f0e6;color:#2a5e36;}.rn{background:#e6eaf0;color:#2a3a5e;}.rk{background:#f0e6f0;color:#5e2a5e;}.rm{background:#faeedd;color:#7a4a0a;}
.pres{background:#e8f5e9;color:#2e7d32;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.abs{background:#fdecea;color:#a32d2d;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.emsg{text-align:center;padding:3rem;color:var(--k-muted);font-size:14px;line-height:2;}

/* LEGEND */
.legend{display:flex;gap:14px;align-items:center;padding:10px 20px;border-top:1px solid var(--k-border);background:var(--k-card);border-radius:0 0 10px 10px;margin:0 16px 16px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--k-muted);}
.ld{width:11px;height:11px;border-radius:3px;}

/* MODAL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(40,42,30,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
.modal{background:var(--k-card);border-radius:14px;border:1px solid var(--k-border);padding:24px 26px;width:440px;max-width:96vw;box-shadow:0 16px 48px rgba(0,0,0,.22);max-height:92vh;overflow-y:auto;animation:popIn .18s ease;}
.modal-wide{width:740px;}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-hdr-left{display:flex;align-items:center;gap:10px;}
.modal-hdr h3{font-size:17px;font-weight:700;color:var(--k-dark);}
.picon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#f0f2e0;font-size:17px;flex-shrink:0;}
.xbtn{background:none;border:none;cursor:pointer;color:var(--k-muted);font-size:26px;line-height:1;padding:0 4px;border-radius:6px;font-family:'Rubik',sans-serif;transition:all .12s;}
.xbtn:hover{background:var(--k-bg);color:var(--k-dark);}

/* FORM */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--k-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
.field input,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--k-border);border-radius:8px;background:#fff;color:var(--k-text);font-size:14px;font-family:'Rubik',sans-serif;transition:border .15s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--k-base);box-shadow:0 0 0 3px rgba(122,127,85,.12);}
.hint{font-size:12px;color:var(--k-muted);margin-bottom:14px;line-height:1.7;background:rgba(168,173,126,.12);border-radius:8px;padding:10px 12px;border-right:3px solid var(--k-light);}
.pbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.mb{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--k-border);background:#fff;color:var(--k-text);font-family:'Rubik',sans-serif;transition:all .12s;}
.mb:hover{background:var(--k-bg);}
.mb-ok{background:var(--k-mid);color:#f0f2e0;border-color:var(--k-mid);}
.mb-ok:hover{background:var(--k-dark);}
.mb-add{background:var(--k-base);color:#f0f2e0;border-color:var(--k-base);font-size:13px;padding:8px 14px;}
.mb-add:hover{background:var(--k-mid);}

/* TEAM TABLE */
.ttwrap{border:1px solid var(--k-border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
table.tt{border-collapse:collapse;width:100%;font-size:13px;}
table.tt th{background:var(--k-dark);color:var(--k-pale);font-weight:600;padding:9px 12px;text-align:right;border-bottom:1px solid #4a4d38;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-family:'Rubik',sans-serif;}
table.tt td{padding:8px 12px;border-bottom:.5px solid var(--k-border);vertical-align:middle;}
table.tt tr:last-child td{border-bottom:none;}
table.tt tr:hover td{background:#f5f5ee;}
table.tt select,table.tt input[type=text]{padding:5px 9px;border:1.5px solid var(--k-border);border-radius:7px;background:#fff;color:var(--k-text);font-size:12px;width:100%;font-family:'Rubik',sans-serif;}
table.tt select:focus,table.tt input:focus{outline:none;border-color:var(--k-base);}
.stog{display:flex;gap:5px;}
.sb{padding:5px 12px;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;border:1.5px solid var(--k-border);background:#fff;color:var(--k-muted);font-family:'Rubik',sans-serif;transition:all .12s;}
.sb:hover{background:var(--k-bg);}
.sb.sp{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}
.sb.sa{background:#fdecea;color:#a32d2d;border-color:#ef9a9a;}
.delbtn{background:none;border:none;cursor:pointer;color:var(--k-muted);padding:5px 7px;border-radius:6px;font-size:16px;transition:all .12s;}
.delbtn:hover{color:#a32d2d;background:#fdecea;}
.addrow{padding:13px 14px;background:var(--k-bg);border-top:1px solid var(--k-border);display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.addrow .fi{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px;}
.addrow .fi label{font-size:10px;font-weight:700;color:var(--k-muted);text-transform:uppercase;letter-spacing:.5px;}
.addrow .fi input,.addrow .fi select{padding:7px 9px;border:1.5px solid var(--k-border);border-radius:7px;background:#fff;color:var(--k-text);font-size:12px;font-family:'Rubik',sans-serif;}

/* DATE RANGE PICKER */
.date-row{display:flex;gap:12px;}
.date-row .field{flex:1;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--k-dark);color:#e8ebd0;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="kheader">
  <div class="kheader-left">
    <div class="klogo">🛡️</div>
    <div>
      <h1>צוות מבצעים</h1>
      <p>מילואים תשפ"ו &nbsp;·&nbsp; 28.6 – 18.9.2026</p>
    </div>
  </div>
  <div class="kbtn-row">
    <button class="kbtn kbtn-team" onclick="openTeam()">👥 ניהול צוות</button>
    <button class="kbtn kbtn-ai" onclick="openConstraint()">📅 הוסף אילוץ</button>
  </div>
</div>

<div class="kstats">
  <div class="kstat"><div class="kstat-num" id="sM">0</div><div class="kstat-lbl">חברי צוות</div></div>
  <div class="kstat"><div class="kstat-num" id="sP">0</div><div class="kstat-lbl">מגיעים</div></div>
  <div class="kstat"><div class="kstat-num" id="sC">0</div><div class="kstat-lbl">אילוצים</div></div>
  <div class="kstat"><div class="kstat-num">83</div><div class="kstat-lbl">ימי מילואים</div></div>
</div>

<div class="ktable-wrap" id="tw">
  <table class="main-t"><thead id="th"></thead><tbody id="tb"></tbody></table>
</div>
<div class="legend">
  <span style="font-size:11px;font-weight:700;color:var(--k-muted)">מקרא:</span>
  <div class="li"><div class="ld" style="background:var(--k-amber-bg);border:1px solid var(--k-amber)"></div>אילוץ</div>
  <div class="li"><div class="ld" style="background:#eeeee5;border:1px solid #c8cba8"></div>שבת</div>
  <div class="li"><div class="ld" style="background:rgba(122,127,85,.15);border:2px solid var(--k-base)"></div>היום</div>
  <div class="li"><span class="rp rs">סמבצ</span></div>
  <div class="li"><span class="rp rn">סמנא</span></div>
  <div class="li"><span class="rp rk">סמקש</span></div>
  <div class="li"><span class="rp rm">מודיעין</span></div>
</div>

<!-- TEAM MODAL -->
<div class="overlay" id="teamOv" onclick="bgClose(event,'teamOv',true)">
  <div class="modal modal-wide">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="picon" style="background:var(--k-base)">👥</div>
        <h3>ניהול צוות</h3>
        <span style="font-size:12px;color:var(--k-muted);margin-right:8px" id="tc"></span>
      </div>
      <button class="xbtn" onclick="closeTeam()">×</button>
    </div>
    <div class="ttwrap">
      <table class="tt">
        <thead><tr>
          <th style="min-width:145px">שם</th>
          <th style="min-width:95px">סבב</th>
          <th style="min-width:95px">תפקיד</th>
          <th style="min-width:135px">סטטוס</th>
          <th style="width:38px"></th>
        </tr></thead>
        <tbody id="ttb"></tbody>
      </table>
      <div class="addrow">
        <div class="fi"><label>שם מלא</label><input type="text" id="nn" placeholder="שם..." onkeydown="if(event.key==='Enter')addM()"/></div>
        <div class="fi"><label>סבב</label>
          <select id="nr">
            <option value="">—</option>
            <option>סבב א</option><option>סבב ב</option><option>סבב ג</option><option>כל התקופה</option>
          </select>
        </div>
        <div class="fi"><label>תפקיד</label>
          <select id="nro">
            <option value="">—</option>
            <option value="סמבצ">סמבצ</option>
            <option value="סמנא">סמנא</option>
            <option value="סמקש">סמקש</option>
            <option value="מודיעין">מודיעין</option>
          </select>
        </div>
        <button class="mb mb-add" onclick="addM()">＋ הוסף</button>
      </div>
    </div>
    <div class="pbtns"><button class="mb mb-ok" onclick="closeTeam()">סגור</button></div>
  </div>
</div>

<!-- CONSTRAINT MODAL -->
<div class="overlay" id="conOv" onclick="bgClose(event,'conOv',false)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="picon" style="background:var(--k-amber)">📅</div>
        <h3>הוספת אילוץ</h3>
      </div>
      <button class="xbtn" onclick="closeConstraint()">×</button>
    </div>
    <div class="hint">
      בחרי חבר צוות וטווח תאריכים שבהם הוא <strong>לא זמין</strong>.<br>
      התאריכים יסומנו בצהוב בלוח.
    </div>
    <div class="field">
      <label>חבר צוות</label>
      <select id="cMember"><option value="">— בחר חבר —</option></select>
    </div>
    <div class="date-row">
      <div class="field">
        <label>מתאריך</label>
        <input type="date" id="cFrom" min="2026-06-28" max="2026-09-18" value="2026-07-01"/>
      </div>
      <div class="field">
        <label>עד תאריך</label>
        <input type="date" id="cTo" min="2026-06-28" max="2026-09-18" value="2026-07-01"/>
      </div>
    </div>
    <div class="pbtns">
      <button class="mb" onclick="closeConstraint()">ביטול</button>
      <button class="mb mb-ok" onclick="addConstraint()">✓ אשר והוסף</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const S=new Date('2026-06-28'),E=new Date('2026-09-18');
const TODAY=new Date();
let members=[],constraints=[],tidx=-1;

function gd(){const d=[],c=new Date(S);while(c<=E){d.push(new Date(c));c.setDate(c.getDate()+1);}return d;}
const DT=gd();
const HM=['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר'];
const HD=['א','ב','ג','ד','ה','ו','ש'];
function dk(d){return d.toISOString().slice(0,10);}
const TDK=dk(TODAY);
function rc(r){if(r==='סמבצ')return'rs';if(r==='סמנא')return'rn';if(r==='סמקש')return'rk';if(r==='מודיעין')return'rm';return'';}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function bh(){
  const h=document.getElementById('th');h.innerHTML='';
  const mr=document.createElement('tr');
  const nt=document.createElement('th');nt.className='nc';nt.rowSpan=2;nt.textContent='שם / תפקיד';mr.appendChild(nt);
  let cm=-1,cnt=0,ft=null;
  DT.forEach((d,i)=>{
    if(d.getMonth()!==cm){if(ft)ft.colSpan=cnt;cm=d.getMonth();cnt=0;ft=document.createElement('th');ft.textContent=HM[d.getMonth()+1];mr.appendChild(ft);}
    cnt++;if(i===DT.length-1&&ft)ft.colSpan=cnt;
  });
  h.appendChild(mr);
  const dr=document.createElement('tr');tidx=-1;
  DT.forEach((d,i)=>{
    const t=document.createElement('th');
    t.innerHTML=d.getDate()+'<br><span style="font-size:9px;opacity:.5">'+HD[d.getDay()]+'</span>';
    if(d.getDay()===6)t.style.background='#4a4d38';
    if(dk(d)===TDK){t.classList.add('tdy');tidx=i+1;}
    dr.appendChild(t);
  });
  h.appendChild(dr);
}

function bb(){
  const tb=document.getElementById('tb');tb.innerHTML='';
  let pc=0;
  if(!members.length){
    const tr=document.createElement('tr'),td=document.createElement('td');
    td.colSpan=DT.length+1;td.className='emsg';
    td.innerHTML='<div style="font-size:36px;margin-bottom:8px">👥</div>אין חברי צוות עדיין<br><span style="font-size:12px">לחץ על "ניהול צוות" כדי להתחיל</span>';
    tr.appendChild(td);tb.appendChild(tr);
  } else {
    members.forEach(m=>{
      if(m.status==='present')pc++;
      const tr=document.createElement('tr');
      const nd=document.createElement('td');nd.className='ncell';
      let sb=m.status==='present'?'<span class="pres">מגיע ✓</span>':m.status==='absent'?'<span class="abs">לא מגיע</span>':'';
      nd.innerHTML='<div class="nm">'+m.name+'</div><div class="nr">'
        +(m.round?'<span style="color:var(--k-muted)">'+m.round+'</span>':'')
        +(m.role?' <span class="rp '+rc(m.role)+'">'+m.role+'</span>':'')
        +(sb?' '+sb:'')+'</div>';
      tr.appendChild(nd);
      DT.forEach(d=>{
        const td=document.createElement('td');td.className='dc';
        if(d.getDay()===6)td.classList.add('shab');
        const k=dk(d);
        if(constraints.some(c=>c.member===m.name&&k>=c.from&&k<=c.to))td.classList.add('con');
        if(k===TDK)td.classList.add('tdy');
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
  }
  document.getElementById('sM').textContent=members.length;
  document.getElementById('sP').textContent=pc;
  document.getElementById('sC').textContent=constraints.length;
}

function render(){
  bh();bb();
  setTimeout(()=>{
    const w=document.getElementById('tw');
    if(!w||tidx<0)return;
    w.scrollLeft=Math.max(0,130+(tidx-1)*28-w.clientWidth/2+14);
  },150);
}

/* TEAM */
function openTeam(){
  rtt();
  document.getElementById('teamOv').classList.add('open');
  setTimeout(()=>document.getElementById('nn').focus(),120);
}
function closeTeam(){document.getElementById('teamOv').classList.remove('open');render();}

function rtt(){
  document.getElementById('tc').textContent=members.length+' / 24';
  const tb=document.getElementById('ttb');tb.innerHTML='';
  if(!members.length){
    const tr=document.createElement('tr'),td=document.createElement('td');
    td.colSpan=5;td.style.cssText='text-align:center;padding:1.5rem;color:var(--k-muted);font-size:13px;';
    td.textContent='אין חברים — הוסף מהשורה למטה';tr.appendChild(td);tb.appendChild(tr);return;
  }
  members.forEach((m,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input type="text" value="${m.name.replace(/"/g,'&quot;')}" oninput="members[${i}].name=this.value"/></td>
    <td><select onchange="members[${i}].round=this.value">
      <option value="" ${!m.round?'selected':''}>—</option>
      ${['סבב א','סבב ב','סבב ג','כל התקופה'].map(r=>`<option ${m.round===r?'selected':''}>${r}</option>`).join('')}
    </select></td>
    <td><select onchange="members[${i}].role=this.value">
      <option value="" ${!m.role?'selected':''}>—</option>
      ${['סמבצ','סמנא','סמקש','מודיעין'].map(r=>`<option value="${r}" ${m.role===r?'selected':''}>${r}</option>`).join('')}
    </select></td>
    <td><div class="stog">
      <button class="sb ${m.status==='present'?'sp':''}" onclick="ss(${i},'present')">מגיע</button>
      <button class="sb ${m.status==='absent'?'sa':''}" onclick="ss(${i},'absent')">לא מגיע</button>
    </div></td>
    <td><button class="delbtn" onclick="dm(${i})" title="מחק">🗑</button></td>`;
    tb.appendChild(tr);
  });
}

function ss(i,s){members[i].status=members[i].status===s?'':s;rtt();}
function dm(i){
  if(!confirm('למחוק את '+members[i].name+'?'))return;
  const n=members[i].name;members.splice(i,1);
  constraints=constraints.filter(c=>c.member!==n);
  rtt();
}
function addM(){
  const name=document.getElementById('nn').value.trim();
  if(!name)return;
  if(members.length>=24){toast('הגעת למקסימום 24 חברים');return;}
  if(members.some(m=>m.name===name)){toast('חבר עם שם זה כבר קיים');return;}
  members.push({name,round:document.getElementById('nr').value,role:document.getElementById('nro').value,status:''});
  document.getElementById('nn').value='';
  document.getElementById('nr').value='';
  document.getElementById('nro').value='';
  document.getElementById('nn').focus();
  rtt();toast('✓ '+name+' נוסף לצוות');
}

/* CONSTRAINT */
function openConstraint(){
  const sel=document.getElementById('cMember');
  sel.innerHTML='<option value="">— בחר חבר —</option>';
  members.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;sel.appendChild(o);});
  document.getElementById('conOv').classList.add('open');
}
function closeConstraint(){document.getElementById('conOv').classList.remove('open');}
function addConstraint(){
  const member=document.getElementById('cMember').value;
  const from=document.getElementById('cFrom').value;
  const to=document.getElementById('cTo').value;
  if(!member){toast('יש לבחור חבר צוות');return;}
  if(!from||!to){toast('יש לבחור תאריכים');return;}
  if(from>to){toast('תאריך התחלה חייב להיות לפני תאריך הסיום');return;}
  constraints.push({member,from,to});
  closeConstraint();render();
  const d1=new Date(from),d2=new Date(to);
  const days=Math.round((d2-d1)/86400000)+1;
  toast('✓ אילוץ נוסף ל'+member+' ('+days+' ימים)');
}

function bgClose(e,id,rerender){if(e.target===e.currentTarget){document.getElementById(id).classList.remove('open');if(rerender)render();}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTeam();closeConstraint();}});

render();
</script>
</body>
</html>
