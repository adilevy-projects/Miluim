<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צוות מבצעים — לוח מילואים</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--k-dark:#3a3d2e;--k-mid:#5a6040;--k-base:#7a7f55;--k-light:#a8ad7e;--k-pale:#d6d9b8;--k-bg:#f2f0e6;--k-card:#fafaf4;--k-border:#c8cba8;--k-amber:#c8860a;--k-amber-bg:#fdf3d8;--k-text:#2c2e1e;--k-muted:#6b6e50;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Rubik',sans-serif;background:var(--k-bg);color:var(--k-text);direction:rtl;}
.kheader{background:var(--k-dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.kheader-left{display:flex;align-items:center;gap:12px;}
.klogo{width:38px;height:38px;background:var(--k-base);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.kheader h1{font-size:17px;font-weight:700;color:#e8ebd0;}
.kheader p{font-size:11px;color:var(--k-light);margin-top:2px;}
.kbtn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;border:none;font-family:'Rubik',sans-serif;transition:all .15s;}
.kbtn-refresh{background:var(--k-base);color:#f0f2e0;}.kbtn-refresh:hover{background:var(--k-mid);}
.kstats{display:flex;gap:10px;padding:12px 24px;background:var(--k-dark);border-top:1px solid #4a4d38;}
.kstat{background:#4a4d38;border-radius:8px;padding:8px 14px;flex:1;text-align:center;}
.kstat-num{font-size:22px;font-weight:700;color:#d6d9b8;}
.kstat-lbl{font-size:11px;color:var(--k-light);margin-top:2px;}
.sbar{background:var(--k-dark);border-top:1px solid #4a4d38;padding:6px 24px;display:flex;align-items:center;gap:8px;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#6ab04c;}
.sdot.loading{background:var(--k-amber);animation:pulse 1s infinite;}
.sdot.err{background:#e55039;}
.stxt{font-size:11px;color:var(--k-light);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.ktable-wrap{margin:16px;border-radius:10px;border:1px solid var(--k-border);background:var(--k-card);box-shadow:0 2px 8px rgba(58,61,46,.08);overflow:hidden;}
table.mt{border-collapse:collapse;width:100%;font-size:12px;}
table.mt th{background:var(--k-dark);color:var(--k-pale);font-weight:600;padding:7px 3px;text-align:center;border-bottom:1px solid #4a4d38;border-right:1px solid #4a4d38;white-space:nowrap;}
table.mt th.nc{min-width:130px;text-align:right;padding-right:14px;font-size:11px;position:sticky;right:0;z-index:3;background:var(--k-dark);}
table.mt td{padding:5px 3px;text-align:center;border-bottom:.5px solid var(--k-border);border-right:.5px solid var(--k-border);}
table.mt td.ncell{text-align:right;padding:7px 14px;background:var(--k-card);position:sticky;right:0;z-index:1;border-right:2px solid var(--k-border);min-width:130px;}
table.mt tr:hover td{background:rgba(168,173,126,.08);}
table.mt tr:hover td.ncell{background:#f2f5e8;}
table.mt tr.row-absent td{opacity:.5;}
table.mt tr.row-absent td.ncell{background:#f0f0ea;}
table.mt tr.row-absent .nm{color:var(--k-muted);}
td.ncell.round-a{border-right:4px solid #5b8dd9!important;}
td.ncell.round-b{border-right:4px solid #5aaa72!important;}
td.ncell.round-all{border-right:4px solid var(--k-base)!important;}
.nm{font-size:13px;font-weight:600;color:var(--k-dark);}
.nr{font-size:10px;color:var(--k-muted);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.round-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;}
.rb-a{background:#deeaf7;color:#2a4e8a;}
.rb-b{background:#d8f0df;color:#1e6b35;}
.rb-all{background:#e8ebd8;color:#3a3d2e;}
td.dc{min-width:28px;}
td.dc.shab{background:#eeeee5;}
td.dc.home{background:#e2e2db;}
td.dc.con{background:var(--k-amber-bg);}
td.dc.con::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:var(--k-amber);margin:0 auto;}
td.dc.home.con{background:var(--k-amber-bg);}
td.dc.home.con::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:var(--k-amber);margin:0 auto;}
td.dc.tdy{border-top:2px solid var(--k-base);border-bottom:2px solid var(--k-base);background:rgba(122,127,85,.07);}
table.mt th.tdy{background:#4a5230!important;border-top:2px solid var(--k-light)!important;}
tr:last-child td{border-bottom:none;}th:last-child,td:last-child{border-right:none;}
.rp{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.rs{background:#e1f0e6;color:#2a5e36;}.rn{background:#e6eaf0;color:#2a3a5e;}.rk{background:#f0e6f0;color:#5e2a5e;}.rm{background:#faeedd;color:#7a4a0a;}
.pres{background:#e8f5e9;color:#2e7d32;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.abs{background:#fdecea;color:#a32d2d;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.emsg{text-align:center;padding:3rem;color:var(--k-muted);font-size:14px;line-height:2;}
.legend{display:flex;gap:12px;align-items:center;padding:10px 20px;border-top:1px solid var(--k-border);background:var(--k-card);border-radius:0 0 10px 10px;margin:0 16px 16px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--k-muted);}
.ld{width:11px;height:11px;border-radius:3px;}
.spin{animation:rot .7s linear infinite;display:inline-block;}
@keyframes rot{to{transform:rotate(360deg);}}
/* Frozen header + scrollable body */
.ktable-wrap{overflow:hidden !important;}
.table-scroll-x{overflow-x:auto;}
.table-scroll-x table.mt{width:100%;}
.mt-head-wrap{overflow:hidden;}
.mt-body-wrap{overflow-y:auto;overflow-x:hidden;max-height:calc(8 * 38px);}
table.mt thead th{position:sticky;top:0;z-index:4;}
table.mt thead th.nc{position:sticky;top:0;right:0;z-index:5;}
/* Blue Saturday */
td.dc.shab{background:#ddeeff !important;}
table.mt th.shab-hdr{background:#2a4a6a !important;}
/* Summary table */
.sum-wrap{overflow-x:auto;margin:0 16px 16px;border-radius:10px;border:1px solid var(--k-border);background:var(--k-card);box-shadow:0 2px 8px rgba(58,61,46,.08);}
table.sum-t{border-collapse:collapse;width:100%;font-size:11px;}
table.sum-t th{background:var(--k-dark);color:var(--k-pale);font-weight:600;padding:6px 3px;text-align:center;border-bottom:1px solid #4a4d38;border-right:1px solid #4a4d38;white-space:nowrap;}
table.sum-t th.nc{min-width:130px;text-align:right;padding-right:14px;position:sticky;right:0;z-index:3;background:var(--k-dark);}
table.sum-t td{padding:4px 3px;text-align:center;border-bottom:.5px solid var(--k-border);border-right:.5px solid var(--k-border);font-size:11px;font-weight:600;}
table.sum-t td.nc{text-align:right;padding:4px 14px;background:var(--k-card);position:sticky;right:0;z-index:1;border-right:2px solid var(--k-border);min-width:130px;font-size:11px;color:var(--k-muted);}
table.sum-t td.shab{background:#ddeeff !important;}
table.sum-t td.tdy{border-top:2px solid var(--k-base);border-bottom:2px solid var(--k-base);}
table.sum-t th.tdy{background:#4a5230!important;border-top:2px solid var(--k-light)!important;}
table.sum-t tr:last-child td{border-bottom:none;}
table.sum-t th:last-child,table.sum-t td:last-child{border-right:none;}
.sum-label{font-size:10px;font-weight:700;color:var(--k-dark);padding:6px 14px;background:var(--k-bg);border-bottom:.5px solid var(--k-border);text-align:right;}
</style>
</head>
<body>

<div class="kheader">
  <div class="kheader-left">
    <div class="klogo">🛡️</div>
    <div><h1>צוות מבצעים</h1><p>מילואים תשפ"ו · 28.6 – 18.9.2026</p></div>
  </div>
  <button class="kbtn kbtn-refresh" onclick="loadData()"><span id="ri">🔄</span> רענן</button>
</div>

<div class="kstats">
  <div class="kstat"><div class="kstat-num" id="sM">—</div><div class="kstat-lbl">חברי צוות</div></div>
  <div class="kstat"><div class="kstat-num" id="sP">—</div><div class="kstat-lbl">מגיעים</div></div>
  <div class="kstat"><div class="kstat-num" id="sC">—</div><div class="kstat-lbl">אילוצים</div></div>
  <div class="kstat"><div class="kstat-num">83</div><div class="kstat-lbl">ימי מילואים</div></div>
</div>

<div class="sbar">
  <div class="sdot loading" id="sd"></div>
  <span class="stxt" id="st">טוען נתונים...</span>
</div>

<div style="margin:16px;border-radius:10px;border:1px solid var(--k-border);background:var(--k-card);box-shadow:0 2px 8px rgba(58,61,46,.08);overflow:hidden;">
  <div style="overflow-x:auto;overflow-y:auto;max-height:calc(2*38px + 8*36px);" id="tw">
    <table class="mt" id="mainTable" style="border-collapse:collapse;">
      <thead id="th" style="position:sticky;top:0;z-index:4;"></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>
<div style="margin:0 16px 16px;border-radius:10px;border:1px solid var(--k-border);background:var(--k-card);box-shadow:0 2px 8px rgba(58,61,46,.08);overflow:hidden;">
  <div style="overflow-x:auto;" id="sw">
    <table class="sum-t" id="sumTable">
      <thead id="sh"></thead>
      <tbody id="sb2"></tbody>
    </table>
  </div>
</div>
<div class="legend">
  <span style="font-size:11px;font-weight:700;color:var(--k-muted)">מקרא:</span>
  <div class="li"><div class="ld" style="background:var(--k-amber-bg);border:1px solid var(--k-amber)"></div>אילוץ</div>
  <div class="li"><div class="ld" style="background:#e2e2db;border:1px solid #c8cba8"></div>בבית</div>
  <div class="li"><div class="ld" style="background:#eeeee5;border:1px solid #c8cba8"></div>שבת</div>
  <div class="li"><div class="ld" style="background:rgba(122,127,85,.15);border:2px solid var(--k-base)"></div>היום</div>
  <div class="li"><span class="round-badge rb-a">סבב א</span></div>
  <div class="li"><span class="round-badge rb-b">סבב ב</span></div>
  <div class="li" style="margin-right:6px"><span class="rp rs">סמבצ</span></div>
  <div class="li"><span class="rp rn">סמנא</span></div>
  <div class="li"><span class="rp rk">סמקש</span></div>
  <div class="li"><span class="rp rm">מודיעין</span></div>
</div>

<script>
const PUB = '2PACX-1vQXIJJc-KoIBc3HLoQCA3gJdR4_IXNAp0rHiq0v7P4cE38pIzEM8Dfu3c6YGrC4NA';
const M_URL = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=309967777&single=true&output=csv`;
const C_URL = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=1518267182&single=true&output=csv`;
const R_URL = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=181659933&single=true&output=csv`;

const S=new Date('2026-06-28'),E=new Date('2026-09-18'),TODAY=new Date();
let members=[],constraints=[],tidx=-1;

function gd(){const d=[],c=new Date(S);while(c<=E){d.push(new Date(c));c.setDate(c.getDate()+1);}return d;}
const DATES=gd();
const HM=['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר'];
const HD=['א','ב','ג','ד','ה','ו','ש'];
function dk(d){return d.toISOString().slice(0,10);}
const TDK=dk(TODAY);
function rc(r){if(r==='סמבצ')return'rs';if(r==='סמנא')return'rn';if(r==='סמקש')return'rk';if(r==='מודיעין')return'rm';return'';}
// Default rotation schedule — loaded from sheet
let DEFAULT_ROTATIONS = {};

function isHome(k,m){
  const custom=(m.cycles||[]).filter(c=>c.from&&c.to);
  if(!m.useDefault&&custom.length>0) return custom.some(c=>k>=c.from&&k<=c.to);
  return (DEFAULT_ROTATIONS[m.round]||[]).some(([f,t])=>k>=f&&k<=t);
}

// Normalize date string to YYYY-MM-DD
function normDate(v){
  if(!v)return'';
  const s=(v||'').trim();
  if(!s)return'';
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // Try to parse other formats
  const d=new Date(s);
  if(!isNaN(d))return dk(d);
  return s;
}

function setS(type,msg){
  const d=document.getElementById('sd'),t=document.getElementById('st');
  d.className='sdot'+(type==='loading'?' loading':type==='err'?' err':'');
  t.textContent=msg;
}

function parseCSV(text){
  if(!text||!text.trim())return[];
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  return lines.slice(1).map(line=>{
    const cols=[],len=line.length;
    let cur='',inQ=false;
    for(let i=0;i<len;i++){
      const ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r=>r.length>0&&r[0]&&r[0].trim());
}

async function fetchOne(url){
  // Try direct fetch first (works when hosted on GitHub Pages)
  try{
    const r=await fetch(url,{cache:'no-store'});
    const txt=await r.text();
    if(txt&&!txt.includes('<html')&&!txt.includes('function n(')&&txt.includes(',')){
      return txt;
    }
  }catch(e){}
  // Fallback: allorigins
  const r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{cache:'no-store'});
  return await r.text();
}

async function loadData(){
  document.getElementById('ri').className='spin';
  setS('loading','טוען נתונים מגוגל שיט...');
  try{
    const [mt,ct,rt]=await Promise.all([fetchOne(M_URL),fetchOne(C_URL),fetchOne(R_URL)]);

    const mRows=parseCSV(mt);
    const cRows=parseCSV(ct);
    const rRows=parseCSV(rt);

    // Build DEFAULT_ROTATIONS from sheet
    DEFAULT_ROTATIONS={};
    rRows.forEach(r=>{
      const round=(r[0]||'').trim();
      const from=normDate(r[1]);
      const to=normDate(r[2]);
      if(round&&from&&to){
        if(!DEFAULT_ROTATIONS[round])DEFAULT_ROTATIONS[round]=[];
        DEFAULT_ROTATIONS[round].push([from,to]);
      }
    });

    members=mRows.map(r=>({
      name:(r[0]||'').trim(),
      round:(r[1]||'').trim(),
      role:(r[2]||'').trim(),
      status:(r[3]||'').trim(),
      useDefault: ['TRUE','true','1','כן','yes'].includes((r[4]||'').trim()),
      cycles: [
        {from:normDate(r[5]), to:normDate(r[6])},
        {from:normDate(r[7]), to:normDate(r[8])},
        {from:normDate(r[9]), to:normDate(r[10])},
        {from:normDate(r[11]), to:normDate(r[12])},
        {from:normDate(r[13]), to:normDate(r[14])},
      ]
    })).filter(m=>m.name);

    constraints=cRows.map(r=>({
      member:(r[0]||'').trim(),
      from:(r[1]||'').trim(),
      to:(r[2]||'').trim()
    })).filter(c=>c.member&&c.from&&c.to);



    const now=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    setS('ok',`✓ עודכן ${now} · ${members.length} חברים · ${constraints.length} אילוצים`);
    render();
  }catch(e){
    setS('err','שגיאה: '+e.message);
    console.error(e);
  }
  document.getElementById('ri').className='';
}

function bh(){
  const h=document.getElementById('th');h.innerHTML='';
  const mr=document.createElement('tr');
  const nt=document.createElement('th');nt.className='nc';nt.rowSpan=2;nt.textContent='שם / תפקיד';mr.appendChild(nt);
  let cm=-1,cnt=0,ft=null;
  DATES.forEach((d,i)=>{
    if(d.getMonth()!==cm){if(ft)ft.colSpan=cnt;cm=d.getMonth();cnt=0;ft=document.createElement('th');ft.textContent=HM[d.getMonth()+1];mr.appendChild(ft);}
    cnt++;if(i===DATES.length-1&&ft)ft.colSpan=cnt;
  });
  h.appendChild(mr);
  const dr=document.createElement('tr');tidx=-1;
  DATES.forEach((d,i)=>{
    const t=document.createElement('th');
    t.innerHTML=d.getDate()+'<br><span style="font-size:9px;opacity:.5">'+HD[d.getDay()]+'</span>';
    if(d.getDay()===6){t.style.background='#2a4a6a';t.classList.add('shab-hdr');}
    if(dk(d)===TDK){t.classList.add('tdy');tidx=i+1;}
    dr.appendChild(t);
  });
  h.appendChild(dr);
}

function bb(){
  const tb=document.getElementById('tb');tb.innerHTML='';
  let pc=0;
  if(!members.length){
    const tr=document.createElement('tr'),td=document.createElement('td');
    td.colSpan=DATES.length+1;td.className='emsg';
    td.innerHTML='<div style="font-size:32px;margin-bottom:8px">📊</div>לא נמצאו נתונים<br><span style="font-size:12px">וודאי שגיליון "חברים" מכיל נתונים</span>';
    tr.appendChild(td);tb.appendChild(tr);
  }else{
    const sorted=[...members].sort((a,b)=>{
      if(a.status==='absent'&&b.status!=='absent')return 1;
      if(a.status!=='absent'&&b.status==='absent')return -1;
      return 0;
    });
    sorted.forEach(m=>{
      if(m.status==='present')pc++;
      const tr=document.createElement('tr');
      if(m.status==='absent')tr.classList.add('row-absent');
      let rClass='',rBadge='',rBadgeClass='';
      if(m.round==='סבב א'){rClass='round-a';rBadge='סבב א';rBadgeClass='rb-a';}
      else if(m.round==='סבב ב'){rClass='round-b';rBadge='סבב ב';rBadgeClass='rb-b';}
      else if(m.round==='כל התקופה'){rClass='round-all';rBadge='כל התקופה';rBadgeClass='rb-all';}
      const nd=document.createElement('td');
      nd.className='ncell'+(rClass?' '+rClass:'');
      const sb=m.status==='present'?'<span class="pres">מגיע ✓</span>':m.status==='absent'?'<span class="abs">לא מגיע</span>':'';
      const defBadge=m.useDefault
        ?'<span style="font-size:9px;background:#e8ebd8;color:#3a3d2e;padding:1px 5px;border-radius:10px;font-weight:700">✓ דיפולט</span>'
        :'<span style="font-size:9px;background:#fdf3d8;color:#7a4a0a;padding:1px 5px;border-radius:10px;font-weight:700">✎ מותאם</span>';
      nd.innerHTML='<div class="nm">'+m.name+'</div><div class="nr">'
        +(rBadge?'<span class="round-badge '+rBadgeClass+'">'+rBadge+'</span>':'')
        +(m.role?' <span class="rp '+rc(m.role)+'">'+m.role+'</span>':'')
        +' '+defBadge+(sb?' '+sb:'')+'</div>';
      tr.appendChild(nd);
      DATES.forEach(d=>{
        const td=document.createElement('td');td.className='dc';
        const k=dk(d);
        if(d.getDay()===6)td.classList.add('shab');
        if(isHome(k,m))td.classList.add('home');
        if(constraints.some(c=>c.member===m.name&&k>=c.from&&k<=c.to))td.classList.add('con');
        if(k===TDK)td.classList.add('tdy');
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });
  }
  document.getElementById('sM').textContent=members.length;
  document.getElementById('sP').textContent=pc;
  document.getElementById('sC').textContent=constraints.length;
}

function buildSummary(){
  const roles = ['סמבצ','סמנא','סמקש','מט','מודיעין'];
  // Build header (same as main)
  const sh = document.getElementById('sh');
  sh.innerHTML = '';
  const mr = document.createElement('tr');
  const nt = document.createElement('th');
  nt.className='nc'; nt.rowSpan=2; nt.textContent='סיכום יומי'; mr.appendChild(nt);
  let cm=-1,cnt=0,ft=null;
  DATES.forEach((d,i)=>{
    if(d.getMonth()!==cm){if(ft)ft.colSpan=cnt;cm=d.getMonth();cnt=0;ft=document.createElement('th');ft.textContent=HM[d.getMonth()+1];mr.appendChild(ft);}
    cnt++;if(i===DATES.length-1&&ft)ft.colSpan=cnt;
  });
  sh.appendChild(mr);
  const dr=document.createElement('tr');
  DATES.forEach((d,i)=>{
    const t=document.createElement('th');
    t.innerHTML=d.getDate()+'<br><span style="font-size:9px;opacity:.5">'+HD[d.getDay()]+'</span>';
    if(d.getDay()===6)t.style.background='#2a4a6a';
    if(dk(d)===TDK)t.classList.add('tdy');
    dr.appendChild(t);
  });
  sh.appendChild(dr);

  // Build rows
  const sb = document.getElementById('sb2');
  sb.innerHTML='';
  const rowLabels = ['סה"כ בבסיס', ...roles.map(r=>'סה"כ '+r)];
  
  rowLabels.forEach((label,ri)=>{
    const tr=document.createElement('tr');
    const ntd=document.createElement('td');
    ntd.className='nc'; ntd.textContent=label; tr.appendChild(ntd);
    
    DATES.forEach(d=>{
      const k=dk(d);
      const td=document.createElement('td');
      if(d.getDay()===6) td.classList.add('shab');
      if(k===TDK) td.classList.add('tdy');
      
      // Count members in base on this day with this role
      let count=0;
      members.forEach(m=>{
        if(m.status==='absent') return; // not coming at all
        const home=isHome(k,m);
        const constrained=constraints.some(c=>c.member===m.name&&k>=c.from&&k<=c.to);
        if(home||constrained) return; // not in base
        // In base!
        if(ri===0){ // total
          count++;
        } else {
          const role=roles[ri-1];
          if(m.role===role) count++;
        }
      });
      
      td.textContent = count || '';
      if(count>0){
        const intensity=Math.min(count,10)/10;
        const g=Math.round(180-intensity*60);
        td.style.background=`rgba(90,160,114,${intensity*0.6})`;
        td.style.color=count>5?'#1e4a2a':'var(--k-text)';
        td.style.fontWeight='700';
      }
      tr.appendChild(td);
    });
    sb.appendChild(tr);
  });
}

function syncScroll(){
  const tw=document.getElementById('tw');
  const sw=document.getElementById('sw');
  if(!tw||!sw) return;
  tw.addEventListener('scroll',()=>{ sw.scrollLeft=tw.scrollLeft; });
  sw.addEventListener('scroll',()=>{ tw.scrollLeft=sw.scrollLeft; });
}

function render(){
  bh();bb();buildSummary();
  setTimeout(()=>{
    const w=document.getElementById('tw');
    if(!w||tidx<0)return;
    w.scrollLeft=Math.max(0,130+(tidx-1)*28-w.clientWidth/2+14);
  },150);
}

setInterval(loadData,60000);
loadData();
setTimeout(syncScroll,500);
</script>
